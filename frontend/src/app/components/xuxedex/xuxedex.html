<div class="xuxedex-wrapper">
  <h2 class="title">📖 La Meva Xuxedex</h2>

  <div class="filter-bar">
    <div class="filter-group">
      <label>Filtrar per Tipus:</label>
      <select [(ngModel)]="filterType" (change)="applyFilters()">
        <option value="">🌎 Tots els tipus</option>
        <option value="Aigua">💧 Aigua</option>
        <option value="Terra">🪨 Terra</option>
        <option value="Aire">🌪️ Aire</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Filtrar per Mida:</label>
      <select [(ngModel)]="filterSize" (change)="applyFilters()">
        <option value="">📏 Totes les mides</option>
        <option value="Petit">Petit</option>
        <option value="Mitjà">Mitjà</option>
        <option value="Gran">Gran</option>
      </select>
    </div>
  </div>

  <div class="xuxedex-grid">
    
    @for (xuxe of filteredXuxemons; track xuxe.id) {
      <div class="xuxe-card">
        <img [src]="xuxe.image || '/assets/default-xuxe.png'" [alt]="xuxe.name" class="xuxe-img">
        
        <h3 class="xuxe-name">{{ xuxe.name }}</h3>
        
        <div class="badges-container">
          <span class="badge type-badge" [ngClass]="xuxe.type.toLowerCase()">
            {{ xuxe.type }}
          </span>
          <span class="badge size-badge">{{ xuxe.size }}</span>
        </div>
      </div>
    } 
    @empty {
      <div class="empty-state">
        <h3>No s'ha trobat cap Xuxemon! 🕵️‍♂️</h3>
        <p>Intenta canviar els filtres o aconsegueix-ne de nous.</p>
      </div>
    }
    
  </div>
</div>
